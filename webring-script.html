<script>
    //Kindly do not delete these attribution comments.
    // The bulk of the JS was developed by Chris Coyier, 2020 (https://css-tricks.com/how-you-might-build-a-modern-day-webring/).
    //Adapted by Megan Drury (inefficiently) for use for the Academic Philosophy Webring. I will rewrite my changes in the future.
    
        const DATA_FOR_WEBRING = `https://raw.githubusercontent.com/megan-drury/The-Academic-Philosophy-Webring/refs/heads/main/philosophy-webring-data.json`;
    
        const template = document.createElement("template");
    
        template.innerHTML = `
            <style>
            .webring {
              border: 3px solid #222;
              border-top-color: #666;
              border-left-color: #666;
              padding: 1rem; 
            
              display: grid;
              grid-gap: 1rem;
            
              text-align: center;
            
              font: 100% system-ui, sans-serif;
            }
    
            
            </style>
            
            <div class="webring">
              <div class="top" id="webDetail"></div>
            </div>`;
    
                            class WebRing extends HTMLElement {
                                connectedCallback() {
                                    this.attachShadow({ mode: "open" });
                                    this.shadowRoot.appendChild(template.content.cloneNode(true));
    
                                    // e.g. https://css-tricks.com
                                    const thisSite = this.getAttribute("site");
    
                                    fetch(DATA_FOR_WEBRING)
                                        .then((response) => response.json())
                                        .then((sites) => {
                                            // Find the current site in the data
                                            const matchedSiteIndex = sites.findIndex((site) => site.url === thisSite);
                                            const matchedSite = sites[matchedSiteIndex];
    
                                            let prevSiteIndex = matchedSiteIndex - 1;
                                            if (prevSiteIndex === -1) prevSiteIndex = sites.length - 1;
    
                                            let nextSiteIndex = matchedSiteIndex + 1;
                                            if (nextSiteIndex > sites.length) nextSiteIndex = 0;
    
                                            const randomSiteIndex = this.getRandomInt(0, sites.length - 1);
    
                                            const webDetailHTML = `
              <p> You are currently visiting:<br>
              <i><b><a href="${matchedSite.url}">${matchedSite.name}</a></i></b>.</p>
              <p>***</p>
               <p>${matchedSite.owner} is proud to be part of</p>
                                           
              <h3>The Academic Philosophy Webring</h3>
              <small>est. 2026</small>
              <p><img src="https://github.com/megan-drury/The-Academic-Philosophy-Webring/blob/main/webringicon.png?raw=true" width=80px></p>
                                            
              <p>
                <a href="${sites[prevSiteIndex].url}">[Prev]</a>
                <a href="${sites[nextSiteIndex].url}">[Next]</a>
                <a href="${sites[randomSiteIndex].url}">[Random]</a>
              </p>
              <p><small>Click <a href="https://megandrury-philosophy.neocities.org/academicphilosophywebring.html">here</a> to find out more about The Academic Philosophy Webring</small></p>
            `;
    
                                            this.shadowRoot
                                                .querySelector("#webDetail")
                                                .insertAdjacentHTML("afterbegin", webDetailHTML);
                                        });
                                }
    
                                getRandomInt(min, max) {
                                    min = Math.ceil(min);
                                    max = Math.floor(max);
                                    return Math.floor(Math.random() * (max - min + 1)) + min;
                                }
                            }
    
                            window.customElements.define("academic-philosophy-webring", WebRing);
</script>
